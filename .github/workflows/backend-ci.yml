name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8
    
    - run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - run: pytest
      env:
        DATABASE_URL: postgresql://postgres.agbkhtpizxahatjawfdy:[YOUR-PASSWORD]@aws-1-eu-central-2.pooler.supabase.com:6543/postgres
    
    - run: docker build -t backend:test .
